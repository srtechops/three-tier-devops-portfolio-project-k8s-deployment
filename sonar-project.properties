sonar.projectKey=three-tier-k8s-project
sonar.projectName=Three Tier K8s Project
sonar.projectVersion=1.0

# Comma-separated paths to directories with sources (required)
sonar.sources=frontend/src,backend/src/main/java

# Comma-separated paths to directories with tests (optional)
sonar.tests=backend/src/test/java

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Java settings
sonar.java.binaries=backend/target/classes
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Global exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/*.spec.js,**/*.test.js,**/*.spec.jsx,**/*.test.jsx




sonar.host.url=http://13.127.216.8:9000