spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:portfolio}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  auth:
    token: ${AUTH_TOKEN:my-secret-static-token-123}
    username: ${ADMIN_USER:admin}
    password: ${ADMIN_PASS:admin123}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
